<svg xmlns="http://www.w3.org/2000/svg" width="794" height="1123" viewBox="0 0 794 1123" role="img" aria-label="Multi-page PDF — a report cover over a stack of A4 pages">
  <title>Multi-Page PDF</title>
  <style>
    :root{
      --pine:#0c322c; --jungle:#30ba78; --mint:#90ebcd;
      --ink:#141414; --fog:#efefef;
    }
    .sans{font-family:'SUSE','SUSE Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
    .mono{font-family:'SUSE Mono',ui-monospace,Menlo,monospace;}

    .bob1{animation:bob1 6.5s ease-in-out infinite;}
    .bob2{animation:bob2 6.5s ease-in-out infinite;}
    @keyframes bob1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

    .dot{animation:runrule 3.2s ease-in-out infinite;}
    @keyframes runrule{0%{transform:translateX(0)}50%{transform:translateX(232px)}100%{transform:translateX(0)}}

    .sheen{opacity:.5;transform:translateX(-320px);animation:sheen 6s ease-in-out infinite;}
    @keyframes sheen{0%{transform:translateX(-320px)}55%,100%{transform:translateX(760px)}}

    .d{opacity:0;animation:tick 8s linear infinite;}
    .d1{opacity:1;animation-delay:0s;}
    .d2{animation-delay:-6s;}
    .d3{animation-delay:-4s;}
    .d4{animation-delay:-2s;}
    @keyframes tick{0%{opacity:1}27%{opacity:1}33%{opacity:0}94%{opacity:0}100%{opacity:1}}

    @media (prefers-reduced-motion:reduce){
      .bob1,.bob2,.dot,.sheen,.d{animation:none;}
      .sheen{opacity:0;}
    }
  </style>

  <clipPath id="pageClip"><rect x="130" y="175" width="534" height="773" rx="3"/></clipPath>

  <!-- pine backdrop -->
  <rect width="794" height="1123" fill="#0c322c"/>

  <!-- stacked back pages (peeking up + right) -->
  <g class="bob2">
    <rect x="176" y="131" width="534" height="773" rx="3" fill="#bfe9d6"/>
    <rect x="176.5" y="131.5" width="533" height="772" rx="3" fill="none" stroke="#0c322c" stroke-opacity=".12"/>
  </g>
  <g class="bob1">
    <rect x="153" y="153" width="534" height="773" rx="3" fill="#e6f7ee"/>
    <rect x="153.5" y="153.5" width="533" height="772" rx="3" fill="none" stroke="#0c322c" stroke-opacity=".12"/>
  </g>

  <!-- cover page -->
  <rect x="130" y="175" width="534" height="773" rx="3" fill="#ffffff"/>

  <!-- logo lockup -->
  <g class="sans">
    <rect x="185" y="212" width="30" height="30" rx="7" fill="#30ba78"/>
    <circle cx="200" cy="227" r="5" fill="#ffffff"/>
    <text x="228" y="235" font-size="27" font-weight="700" letter-spacing="6" fill="#0c322c">SUSE</text>
  </g>

  <!-- accent rule + travelling highlight -->
  <rect x="185" y="686" width="245" height="5" rx="2.5" fill="#30ba78"/>
  <circle class="dot" cx="185" cy="688.5" r="6.5" fill="#90ebcd"/>

  <!-- title -->
  <g class="sans" fill="#0c322c">
    <text x="185" y="748" font-size="41" font-weight="600" letter-spacing="-.5">Content Automation</text>
    <text x="185" y="796" font-size="41" font-weight="600" letter-spacing="-.5">Report 2026</text>
  </g>

  <!-- subtitle -->
  <text class="sans" x="185" y="842" font-size="20" font-weight="500" fill="#30ba78">A summer of building in the open</text>

  <!-- footer meta -->
  <text class="sans" x="185" y="906" font-size="14" fill="#0c322c" fill-opacity=".55">Prepared for internal review · Confidential</text>

  <!-- page counter -->
  <g class="mono">
    <text x="617" y="907" font-size="15" text-anchor="end" fill="#0c322c" fill-opacity=".85">/ 4</text>
    <g fill="#0c322c" fill-opacity=".85" text-anchor="end" font-size="15">
      <text class="d d1" x="582" y="907">1</text>
      <text class="d d2" x="582" y="907">2</text>
      <text class="d d3" x="582" y="907">3</text>
      <text class="d d4" x="582" y="907">4</text>
    </g>
  </g>

  <!-- diagonal sheen sweeping the cover -->
  <g clip-path="url(#pageClip)">
    <polygon class="sheen" points="0,175 150,175 60,948 -90,948" fill="#ffffff"/>
  </g>
</svg>
