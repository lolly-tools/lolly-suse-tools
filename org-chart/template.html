<div class="artboard" style="background:{{lookup bgStyle 0}}">
  <div class="oc-conn-wrap">{{{connectorSvg}}}</div>
  {{#each boxes}}
  <div class="lolly-box oc-box" data-canvas-input="boxes:{{@index}}" data-box-id="{{default id @index}}" style="{{lookup ../boxStyle @index}}">
    {{{lookup ../mediaHtml @index}}}
    <div class="lolly-box-text" style="{{lookup ../textStyle @index}}">{{{lookup ../textHtml @index}}}</div>
  </div>
  {{/each}}
</div>
