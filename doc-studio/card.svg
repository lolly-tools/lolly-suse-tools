<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1075" width="760" height="1075" role="img" aria-label="Doc Studio — a rich-text document">
  <!--
    Lean, ANIMATED committed gallery card for the doc-studio tool. A MOCK of a document
    page (not a literal screenshot), at the tool's true A4 output ratio (794×1123 → 760×1075).
    The body text is ALWAYS fully visible (a card must read complete at a glance, and an
    <img> SVG re-runs its animation on every decode); only the ACCENTS move — the two green
    heading rules draw in / hold / erase on a seamless loop, and a caret blinks. Pure CSS
    @keyframes animate in an <img>; text falls back to the system sans stack (secure-mode
    SVG has no external webfont). Flat + a few KB — replaces the text-heavy raster thumbnail.
  -->
  <style>
    text{font-family:'SUSE','SUSE Sans',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .h1{font-size:46px;font-weight:800;fill:#141414}
    .h2{font-size:30px;font-weight:800;fill:#141414}
    .p{font-size:19px;fill:#44484a}
    .b{font-size:19px;fill:#2f3335}
    .bold{font-weight:700;fill:#141414}
    .foot{font-size:15px;fill:#a2a6a6}
    /* Rule draws in, holds, erases — 0% and 100% are both fully hidden (offset ±640 on a
       640-long dash), so the loop wraps seamlessly with no pop. Text is untouched. */
    .rule{stroke:#30ba78;stroke-width:4;stroke-linecap:round;stroke-dasharray:640;
          animation:ds-rule 5.5s ease-in-out infinite}
    @keyframes ds-rule{0%{stroke-dashoffset:640}18%{stroke-dashoffset:0}
      80%{stroke-dashoffset:0}100%{stroke-dashoffset:-640}}
    .caret{fill:#30ba78;animation:ds-blink 1.1s steps(1) infinite}
    @keyframes ds-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @media (prefers-reduced-motion:reduce){
      .rule{animation:none;stroke-dashoffset:0}.caret{animation:none;opacity:.9}}
  </style>
  <rect width="760" height="1075" fill="#ffffff"/>

  <text class="h1" x="64" y="120">Your document title</text>
  <line class="rule" x1="64" y1="142" x2="696" y2="142"/>
  <text class="p" x="64" y="186">Welcome to <tspan class="bold">Doc Studio</tspan> — a real word processor. Select and</text>
  <text class="p" x="64" y="214">delete across anything, and insert tables, lists and images inline.</text>

  <text class="h2" x="64" y="290">Write the way you think</text>
  <line class="rule" x1="64" y1="308" x2="696" y2="308" style="animation-delay:.4s"/>

  <circle cx="74" cy="352" r="5" fill="#30ba78"/>
  <text class="b" x="96" y="358">Paste rich text — bold, italics, lists and tables keep their shape</text>
  <circle cx="74" cy="396" r="5" fill="#30ba78"/>
  <text class="b" x="96" y="402">Insert a Lolly render — a QR code, a chart, a map — inline</text>
  <circle cx="74" cy="440" r="5" fill="#30ba78"/>
  <text class="b" x="96" y="446">Headings 1 to 4, SUSE or SUSE Mono, export to PDF</text>
  <rect class="caret" x="96" y="470" width="4" height="26"/>

  <text class="foot" x="64" y="1044">Untitled document</text>
  <text class="foot" x="696" y="1044" text-anchor="end">1 / 1</text>
</svg>
