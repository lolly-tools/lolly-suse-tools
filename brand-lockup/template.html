<svg id="lockup-svg" xmlns="http://www.w3.org/2000/svg"
     width="{{w}}" height="{{h}}" viewBox="0 0 {{w}} {{h}}"
     preserveAspectRatio="xMidYMid meet"
     data-surface="{{surface}}"
     style="display:block;width:100%;height:100%;">
  {{{inner}}}
</svg>
<script>
/* Paint a preview-only backdrop on the canvas (so negative/white lockups stay
   visible). It lives on the canvas element, never inside the SVG, so it is never
   part of the export. The canvas itself is sized by the shell from the export
   dimensions; the SVG fills it and `preserveAspectRatio` keeps the lockup centred. */
(function () {
  var canvas = document.getElementById('tool-canvas');
  if (!canvas) return;
  var svg = canvas.querySelector('#lockup-svg');
  var s = (svg && svg.getAttribute('data-surface')) || 'transparent';
  canvas.style.background = (s === 'transparent') ? '' : s;
}());
</script>
